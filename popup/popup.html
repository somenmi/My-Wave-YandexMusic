<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYM – Моя Волна</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 280px;
            background: #1e1e1e;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 12px;
            user-select: none;
        }

        .panel {
            padding: 10px 12px;
        }

        h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ddd;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .section {
            margin-bottom: 12px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            padding: 2px 0;
        }

        .toggle-row label {
            flex: 1;
        }

        input[type="checkbox"] {
            margin-left: 8px;
            transform: scale(1.1);
            cursor: pointer;
        }

        .slider-row {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .slider-row span.label {
            width: 75px;
            flex-shrink: 0;
            font-size: 11px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #444;
            outline: none;
            margin: 0 6px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #888;
            border-radius: 2px;
            cursor: pointer;
        }

        .val {
            width: 35px;
            text-align: right;
            font-size: 11px;
            color: #aaa;
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .preset-btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 2px;
        }

        .preset-btn:active {
            background: #555;
        }

        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="section">
            <h3>Скрытие элементов</h3>
            <div class="toggle-row">
                <label>Скрыть Canvas</label>
                <input type="checkbox" id="hideCanvas">
            </div>
            <div class="toggle-row">
                <label>Скрыть свечение (градиент)</label>
                <input type="checkbox" id="hideGlow">
            </div>
            <div class="toggle-row">
                <label>Скрыть надпись «Моя волна»</label>
                <input type="checkbox" id="hideMyWaveLabel">
            </div>
            <div class="toggle-row">
                <label>Скрыть блок «Моя волна обновилась»</label>
                <input type="checkbox" id="hideFeedback">
            </div>
        </div>

        <div class="section">
            <h3>Фильтры</h3>
            <div class="slider-row">
                <span class="label">Ч/б</span>
                <input type="range" id="grayscale" min="0" max="1" step="0.01" value="0">
                <span class="val" id="grayscale-val">0</span>
            </div>
            <div class="slider-row">
                <span class="label">Яркость</span>
                <input type="range" id="brightness" min="0" max="2" step="0.01" value="1">
                <span class="val" id="brightness-val">1</span>
            </div>
            <div class="slider-row">
                <span class="label">Сепия</span>
                <input type="range" id="sepia" min="0" max="1" step="0.01" value="0">
                <span class="val" id="sepia-val">0</span>
            </div>
            <div class="slider-row">
                <span class="label">HUE</span>
                <input type="range" id="hue-rotate" min="0" max="360" step="1" value="0">
                <span class="val" id="hue-val">0°</span>
            </div>
            <div class="slider-row">
                <span class="label">Насыщ.</span>
                <input type="range" id="saturate" min="0" max="600" step="1" value="100">
                <span class="val" id="saturate-val">100%</span>
            </div>
        </div>

        <div class="section">
            <div class="presets">
                <button class="preset-btn" id="normal-btn">Обычный</button>
                <button class="preset-btn" id="bw-btn">Ч/б</button>
                <button class="preset-btn" id="sepia-btn">Сепия</button>
                <button class="preset-btn" id="hue-btn">Оттенок</button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
